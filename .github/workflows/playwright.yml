name: Playwright E2E
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'https://www.osss.pro'

# Limit gleichzeitige Runs auf gleichem Branch
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'https://www.osss.pro' }}
          # Optional secrets — test-user fuer login-flow + leads-search
          PLAYWRIGHT_TEST_EMAIL:    ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          PLAYWRIGHT_GYM_ID:        ${{ vars.PLAYWRIGHT_GYM_ID }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint + TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22 LTS — Next.js 16.2 verlangt ≥20.9, wir nehmen 22 für mehr Headroom
          # und stabilere npm-Version (ships with npm 10.9+).
          node-version: '22'
          cache: 'npm'

      - name: Install
        # `npm ci` ist strict — bricht bei Lockfile-Drift. Falls das passiert,
        # haben wir vermutlich ein Sync-Problem das lokal mit `npm install`
        # gefixt werden muss.
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeCheck
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm run test:unit

name: Deploy to Vercel

# Robuster CI-driven Deploy. Webhook-unabhängig — wir rufen Vercel direkt
# über die offizielle CLI auf. Lief ein Webhook-Problem (gesehen 2026-05-28
# bei bjjpunkte: gh push triggerte keine Vercel-Builds mehr), würde dieser
# Workflow trotzdem deployen.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production
        run: |
          # WICHTIG: kein --prebuilt + kein separater vercel build Step.
          # Grund: Project hat SUPABASE-Keys etc. als type=sensitive, die werden
          # bei `vercel pull` nicht in .env entschlüsselt → Build embedded sie
          # nicht → Lambdas crashen mit "URL and Key required".
          # Stattdessen: vercel deploy --prod uploaded source, Vercel macht
          # Build + Deploy serverseitig MIT korrekten env-vars.
          DEPLOY_URL=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "🚀 Deployed: $DEPLOY_URL"
          {
            echo "## ✅ Deployed to Production"
            echo ""
            echo "**URL:** $DEPLOY_URL"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Message:** ${{ github.event.head_commit.message }}"
          } >> $GITHUB_STEP_SUMMARY

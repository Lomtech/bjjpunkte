<?xml version="1.0" encoding="UTF-8"?>
<!--
  OSSS WORTMARKE — Reine Schrift-Marke ohne Bild.
  Schützt das WORT "Osss" in jeder Schriftart, Farbe, Größe.

  → Dies ist die STÄRKSTE Schutzform für deinen Brand-Namen.
    Konkurrent darf den Namen "Osss" dann auch nicht in anderer
    Aufmachung nutzen (anders als Wort-Bild-Marke).

  Hinweis: Bei DPMA-Anmeldung als WORTMARKE wird nur der Text
  "Osss" als String eingetragen — KEIN Bild nötig. Diese Datei
  dient nur zur Vorschau / Marken-Klärung.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="1600" height="600"
     viewBox="0 0 1600 600"
     style="background:#ffffff">
  <rect width="1600" height="600" fill="#ffffff"/>
  <text x="800" y="430"
        font-family="'Arial Black', 'Helvetica Bold', sans-serif"
        font-size="420"
        font-weight="900"
        fill="#09090B"
        letter-spacing="-15"
        text-anchor="middle">Osss</text>
</svg>

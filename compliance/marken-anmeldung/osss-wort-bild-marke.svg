<?xml version="1.0" encoding="UTF-8"?>
<!--
  OSSS WORT-BILD-MARKE — Bild + Schriftzug kombiniert.

  Layout:  Quadrat links + "Osss"-Schriftzug rechts (Querformat)
  Maße:    2400 × 800 px
  Konvertiert via headless Chrome (Browser-akkurate Schrift-Rendering)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="2400" height="800"
     viewBox="0 0 2400 800"
     style="background:#ffffff">
  <!-- Weißer Hintergrund (Pflicht für DPMA) -->
  <rect width="2400" height="800" fill="#ffffff"/>

  <!-- Amber-Quadrat (links) — 600×600 px, gerundete Ecken -->
  <rect x="100" y="100" width="600" height="600" rx="120" ry="120" fill="#FBBF24"/>

  <!-- Drei Belt-Stripes IM Quadrat — vertikal zentriert -->
  <g fill="#09090B">
    <rect x="250" y="284" width="300" height="46" rx="23" ry="23"/>
    <rect x="250" y="377" width="200" height="46" rx="23" ry="23"/>
    <rect x="250" y="470" width="100" height="46" rx="23" ry="23"/>
  </g>

  <!-- Schriftzug "Osss" — links-bündig, vertikal zentriert auf Quadrat-Mitte (y=400) -->
  <text x="850" y="540"
        font-family="'Arial Black', 'Helvetica Bold', sans-serif"
        font-size="420"
        font-weight="900"
        fill="#09090B"
        letter-spacing="-15"
        text-anchor="start">Osss</text>
</svg>

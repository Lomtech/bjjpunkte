<?xml version="1.0" encoding="UTF-8"?>
<!--
  PLATZHALTER für Founder-Foto.

  → Schritt 1: Echtes Foto als public/founder-lom.jpg ablegen (Empfehlung: 800×800 px,
    quadratisch, JPG, idealerweise ein authentisches Foto auf der Matte / im Gym —
    nicht ein Corporate-Headshot).

  → Schritt 2: In src/app/about/page.tsx den Image-Pfad
    `/founder-lom.svg` → `/founder-lom.jpg` umstellen und das Image- width/height
    anpassen falls nötig.

  Aktuell rendert dieses gestylte Monogram „LI" (Lom-Ali Imadaev) auf amber-Hintergrund
  mit zinc-Belt-Stripes als Reminder dass die Brand identity da ist, das Foto fehlt
  aber noch.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Amber Hintergrund mit subtilem Gradient -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#FBBF24" />
    </radialGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)" />
  <rect width="800" height="800" fill="url(#shine)" />

  <!-- Subtle dot grid -->
  <g fill="#000000" opacity="0.04">
    <circle cx="100" cy="100" r="2" />
    <circle cx="200" cy="100" r="2" />
    <circle cx="300" cy="100" r="2" />
    <circle cx="100" cy="200" r="2" />
    <circle cx="200" cy="200" r="2" />
    <circle cx="700" cy="700" r="2" />
    <circle cx="600" cy="700" r="2" />
    <circle cx="700" cy="600" r="2" />
  </g>

  <!-- Belt stripes — Osss brand element, verkleinert oben links -->
  <g fill="#09090B" transform="translate(80, 80)">
    <rect x="0" y="0"  width="180" height="28" rx="14" />
    <rect x="0" y="56" width="120" height="28" rx="14" />
    <rect x="0" y="112" width="60"  height="28" rx="14" />
  </g>

  <!-- Monogram „LI" - zentriert -->
  <text x="400" y="450"
        font-family="'Arial Black', 'Helvetica Bold', sans-serif"
        font-size="280"
        font-weight="900"
        fill="#09090B"
        text-anchor="middle"
        letter-spacing="-15">
    LI
  </text>

  <!-- Footer-Caption -->
  <text x="400" y="710"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22"
        font-weight="600"
        fill="#09090B"
        opacity="0.65"
        text-anchor="middle"
        letter-spacing="2">
    LOM-ALI IMADAEV · OSSS
  </text>
</svg>
